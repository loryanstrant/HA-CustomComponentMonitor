# Example dashboard configurations for Custom Component Monitor
# See README.md for full documentation

# --- Default: show all sections ---
type: custom:custom-component-monitor-card

# --- Custom title and sort by days installed ---
# type: custom:custom-component-monitor-card
# title: Unused Components
# sort: days

# --- Only unused integrations ---
# type: custom:custom-component-monitor-card
# title: Unused Integrations
# sections:
#   - integrations

# --- Themes and frontend only ---
# type: custom:custom-component-monitor-card
# title: Themes & Cards
# sort: days
# sections:
#   - themes
#   - frontend
